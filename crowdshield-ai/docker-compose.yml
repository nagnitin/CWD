version: '3.9'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crowdshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crowdshield
      POSTGRES_PASSWORD: crowdshield_secret
      POSTGRES_DB: crowdshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache & Message Broker ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crowdshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdshield-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://crowdshield:crowdshield_secret@postgres:5432/crowdshield_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      UPLOAD_DIR: /app/uploads
      MODEL_DIR: /app/models
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - uploads_data:/app/uploads
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ──────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdshield-celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://crowdshield:crowdshield_secret@postgres:5432/crowdshield_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      UPLOAD_DIR: /app/uploads
      MODEL_DIR: /app/models
    volumes:
      - ./backend/app:/app/app
      - ./ai:/app/ai
      - uploads_data:/app/uploads
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── React Frontend (Dev) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crowdshield-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crowdshield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  models_data:
